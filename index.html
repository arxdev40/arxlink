<!doctype html>
<html lang="id" x-data="appData">
    <head>

        <meta content="ie=edge" http-equiv="X-UA-Compatible" />

        <link rel="canonical" href="https://arxdev40.github.io/arxlink/" />

        <!-- Preconnect to CDNs & Google Fonts for better performance -->

        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />

        <!-- Google Fonts Poppins -->

        />

        <!-- Custom Stylesheet -->
        <link href="css/style.min.css" rel="stylesheet" />

        <!-- SEO Meta Tags -->
        <meta
            content="Hubungi Arya Putra Sadewa melalui email atau temukan tautan media sosial resminya seperti GitHub, Facebook, Instagram, Threads, dan X."
            name="description"
        />
        <meta
            content="Arya Putra Sadewa, ArX Developer, ArX Link, Link in Bio, Web Developer Indonesia"
            name="keywords"
        />
        <meta content="Arya Putra Sadewa" name="author" />

        <!-- Open Graph (OG) Meta Tags for Social Media Sharing -->
        <meta content="ArX Link - Arya Putra Sadewa" property="og:title" />
        <meta content="website" property="og:type" />
        <meta content="https://arxdev40.github.io/arxlink/" property="og:url" />
        <meta
            content="https://arxdev40.github.io/arxlink/img/og.png"
            property="og:image"
        />
        <meta content="Logo resmi ArX Link" property="og:image:alt" />
        <meta
            content="Hubungi Arya Putra Sadewa melalui email atau temukan tautan media sosial resminya."
            property="og:description"
        />
        <meta content="ArX Link" property="og:site_name" />
        <meta content="id_ID" property="og:locale" />

        <!-- Twitter Card Meta Tags -->
        <meta content="summary" name="twitter:card" />
        <meta content="https://x.com/arxdev40" name="twitter:site" />
        <meta content="ArX Link - Arya Putra Sadewa" name="twitter:title" />
        <meta
            content="Hubungi Arya Putra Sadewa melalui email atau temukan tautan media sosial resminya."
            name="twitter:description"
        />
        <meta
            content="https://arxdev40.github.io/arxlink/img/og.png"
            name="twitter:image"
        />

        <!-- App Icons & PWA Webmanifest -->
        <link rel="icon" href="favicon.ico" sizes="any" />
        <link rel="icon" href="icon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="icon.png" />
        <link href="site.webmanifest" rel="manifest" />

        <meta content="#0d6efd" name="theme-color" />

        <!-- Structured Data (JSON-LD) for SEO Profile Page -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "ProfilePage",
                "mainEntity": {
                    "@type": "Person",
                    "name": "Arya Putra Sadewa",
                    "alternateName": "arxdev40",
                    "jobTitle": "Junior Web Developer",
                    "image": "https://avatars.githubusercontent.com/u/296531533",
                    "sameAs": [
                        "https://github.com/arxdev40",
                        "https://facebook.com/arxdev40",
                        "https://instagram.com/arxdev40",
                        "https://threads.net/@arxdev40",
                        "https://x.com/arxdev40"
                    ]
                }
            }
        </script>
    </head>

    <body class="d-flex flex-column min-dvh-100" x-cloak>
        <!-- Header / Navigation Bar -->
        <header
            class="navbar-glass container mt-sm-3 navbar navbar-expand rounded shadow sticky-top"
            data-aos="fade-down"
        >
            <div class="container-fluid">
                <a
                    class="align-items-center d-flex navbar-brand"
                    href="/"
                    aria-label="Beranda ArX Link"
                >
                    <img
                        alt="Logo ArX Link"
                        class="rounded shadow-sm"
                        decoding="async"
                        fetchpriority="high"
                        loading="lazy"
                        src="icon.png"
                        width="24"
                        height="24"
                    />
                    <span class="fw-semibold h5 mb-0 ms-2">
                        ArX <span class="text-primary">Link</span>
                    </span>
                </a>

                <button
                    class="btn btn-ghost position-relative"
                    type="button"
                    @click="shareLink"
                    aria-label="Bagikan profil ini"
                >
                    <i
                        x-show="!copied"
                        class="bi bi-share-fill"
                        aria-hidden="true"
                    ></i>
                    <i
                        x-show="copied"
                        class="bi bi-check-lg text-success"
                        aria-hidden="true"
                        x-cloak
                    ></i>
                    <span
                        x-show="copied"
                        class="position-absolute top-100 start-50 translate-middle-x mt-2 badge bg-success"
                        x-transition
                        x-cloak
                    >
                        Disalin!
                    </span>
                </button>
            </div>
        </header>

                data-aos="fade-down"
                data-aos-delay="50"
                decoding="async"
                fetchpriority="high"
                src="https://avatars.githubusercontent.com/u/296531533"
                width="112"
                height="112"
            />

            <!-- Name and Verification Badge -->
            <h1
                class="fw-semibold h3 mt-4 text-center"
                data-aos="zoom-in"
                data-aos-delay="100"

                    class="align-middle bi bi-patch-check-fill fs-6 text-primary"
                    aria-hidden="true"

                data-aos="zoom-in"

                                    alt="Logo Gmail"
                                    class="border me-3 rounded shadow-sm"
                                    decoding="async"
                                    fetchpriority="high"
                                    loading="lazy"
                                    src="img/gmail.webp"
                                    width="48"
                                    height="48"
                                />
                                <span class="d-flex flex-column mb-0 me-auto">
                                    <span class="fw-semibold text-dark"
                                        >Email</span
                                    >
                                    <small class="text-secondary"
                                        >arxdev40@gmail.com</small
                                    >
                                </span>
                                <i
                                    class="align-self-start bi bi-box-arrow-up-right text-muted"
                                    aria-hidden="true"
                                ></i>
                            </a>

                    </li>

                                    height="48"

                                <i

            </nav>

            <!-- Scroll To Top Button -->
            <div
                class="bottom-0 end-0 p-3 position-fixed"
                tabindex="-1"
                x-data="{ isScrollToTop: false }"
                @scroll.document="isScrollToTop = (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200)"
            >
                <button
                    class="btn btn-secondary btn-lg btn-fab lh-1 rounded-circle"
                    id="scroll-to-top"
                    type="button"
                    @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
                    x-show="isScrollToTop"
                    x-transition
                    aria-label="Kembali ke atas"
                >
                    <i class="bi bi-arrow-up pe-none" aria-hidden="true"></i>
                </button>
            </div>

        <!-- Footer -->

        ></script>
        <script src="https://cdn.jsdelivr.net/npm/aos/dist/aos.min.js"></script>
